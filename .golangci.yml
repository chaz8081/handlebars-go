version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"
  exclusions:
    # Only report issues in new code on CI (via --new-from-rev flag).
    # This avoids flagging inherited upstream code (Raymond/flowchartsman).
    rules:
      - path: "_test\\.go"
        linters: [errcheck]

formatters:
  enable:
    - gofmt
